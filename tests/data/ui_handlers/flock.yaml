      <body>
          <nav class="navbar" role="navigation" aria-label="main navigation" up-nav>
              <div class="navbar-brand">
                  <a class="navbar-item" href="https://example.com/mobu/ui/" up-follow>
                      <img src=https://example.com/mobu/ui/static/img/monkey.svg width="50", height="160">
                      <h4 class="subtitle" is-4>Mobu</h4>
                  </a>
              </div>
              <div class="navbar-menu">
                  <div class="navbar-start">
                      <a class="navbar-item" href="https://example.com/mobu/ui/config" up-follow>Config</a>
                      <a class="navbar-item" href="https://example.com/mobu/ui/flocks" up-follow>Flocks</a>
                      <a class="navbar-item" href="https://example.com/mobu/ui/ci" up-follow>CI</a>
                      <div class="navbar-item">
                          <strong>|</strong>
                      </div>
                      <div class="navbar-item">
                          <div class="mr-2">Env:</div>
                          <a href="https://test.example.com/">https://test.example.com/</a>
                      </div>
                      <div class="navbar-item">
                          <div up-flashes></div>
                      </div>
                  </div>
              </div>
          </nav>
          <main>
              <section class="section">
                  <div class="container">

      <h2 class="title is-3">Flock - test</h2>
      <p>
      Note that timings for monkey operations have been stripped for ease of reading config information.
      If you want to see timings, use the <a href="https://mobu.lsst.io/api.html#operation/get_monkey_mobu_flocks__flock__monkeys__monkey__get">REST API</a>.
      <div class="pause-button">

          <a href="https://example.com/mobu/ui/flock/test/pause"
             up-method="post"
             up-target=".pause-button:maybe, .pause-value:maybe">
              <button class="button is-warning">Pause</button>
          </a>

  </div>
      <pre class="flock-detail" up-hungry><code class="language-python">FlockData(
      name=&#39;test&#39;,
      config=FlockConfig(
          name=&#39;test&#39;,
          count=1,
          users=None,
          user_spec=UserSpec(
              username_prefix=&#39;testuser&#39;,
              uid_start=None,
              gid_start=None,
          ),
          scopes=[
              &#39;exec:notebook&#39;,
          ],
          business=EmptyLoopConfig(
              type=&#39;EmptyLoop&#39;,
              options=BusinessOptions(
                  error_idle_time=datetime.timedelta(seconds=60),
                  idle_time=datetime.timedelta(seconds=60),
              ),
              restart=False,
          ),
      ),
      monkeys=[
          MonkeyData(
              name=&#39;testuser1&#39;,
              state=&lt;MonkeyState.RUNNING: &#39;RUNNING&#39;&gt;,
              paused=False,
              user=AuthenticatedUser(
                  username=&#39;testuser1&#39;,
                  uidnumber=None,
                  gidnumber=None,
                  scopes=[
                      &#39;exec:notebook&#39;,
                  ],
                  token=&#39;blah&#39;,
              ),
              business=BusinessData(
                  name=&#39;EmptyLoop&#39;,
                  failure_count=0,
                  success_count=1,
                  refreshing=False,
                  paused=False,
                  timings=[],
              ),
          ),
      ],
      paused=False,
  )</code></pre>

                  </main>
              </div>
          </section>
      </body>
      <script src="https://example.com/mobu/ui/static/js/site.js"></script>
